name: Custom macOS aarch64 Build

on:
  workflow_dispatch:
  push:
    branches:
      - custom-selfhost-build

env:
  FLUTTER_VERSION: "3.24.5"
  MAC_RUST_VERSION: "1.81"
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  VERSION: "1.4.6"
  CUSTOM_RENDEZVOUS_SERVER: "192.168.30.217"
  CUSTOM_RS_PUB_KEY: "O2zV5EUeKHJFeousICtF3F+51T5UKSAbnsjCUVND1kk="

jobs:
  build-macos-aarch64:
    runs-on: macos-14
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Inject custom server defaults
        shell: bash
        run: |
          python3 scripts/patch_custom_server.py

      - name: Install build runtime
        run: |
          brew install llvm create-dmg
          if command -v pkg-config >/dev/null 2>&1; then
            echo "pkg-config already installed"
          else
            brew install pkg-config
          fi

      - name: Install NASM 2.x
        run: |
          wget https://www.nasm.us/pub/nasm/releasebuilds/2.16.03/macosx/nasm-2.16.03-macosx.zip
          unzip nasm-2.16.03-macosx.zip
          sudo cp nasm-2.16.03/nasm /usr/local/bin/nasm
          nasm --version

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Patch Flutter
        shell: bash
        run: |
          FLUTTER_ROOT="$(dirname "$(dirname "$(which flutter)")")"
          git -C "$FLUTTER_ROOT" apply "${{ github.workspace }}/.github/patches/flutter_3.24.4_dropdown_menu_enableFilter.diff" || true
          python3 - <<'PY'
          import os
          from pathlib import Path

          flutter_root = Path(os.environ["FLUTTER_ROOT"])
          binding = flutter_root / "packages/flutter/lib/src/scheduler/binding.dart"
          text = binding.read_text()
          text = text.replace(
              "_setFramesEnabledState(false);",
              "//_setFramesEnabledState(false);",
          )
          binding.write_text(text)
          print(f"Patched {binding}")
          PY

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.MAC_RUST_VERSION }}
          targets: aarch64-apple-darwin
          components: rustfmt

      - name: Restore bridge files
        uses: actions/download-artifact@v4
        with:
          name: bridge-artifact
          path: ./
        continue-on-error: true

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg dependencies
        shell: bash
        run: |
          "$VCPKG_ROOT"/vcpkg install --x-install-root="$VCPKG_ROOT/installed"

      - name: Build bridge if artifact is missing
        shell: bash
        run: |
          cargo install flutter_rust_bridge_codegen --version 1.80.1 --features uuid --locked
          pushd flutter
          flutter pub get
          popd
          ~/.cargo/bin/flutter_rust_bridge_codegen \
            --rust-input ./src/flutter_ffi.rs \
            --dart-output ./flutter/lib/generated_bridge.dart \
            --c-output ./flutter/macos/Runner/bridge_generated.h

      - name: Set minimum macOS version
        shell: bash
        run: |
          MIN_MACOS_VERSION="12.3"
          sed -i -e "s/MACOSX_DEPLOYMENT_TARGET\=[0-9]*.[0-9]*/MACOSX_DEPLOYMENT_TARGET=${MIN_MACOS_VERSION}/" build.py
          sed -i -e "s/platform :osx, '.*'/platform :osx, '${MIN_MACOS_VERSION}'/" flutter/macos/Podfile
          sed -i -e "s/osx_minimum_system_version = \"[0-9]*.[0-9]*\"/osx_minimum_system_version = \"${MIN_MACOS_VERSION}\"/" Cargo.toml
          sed -i -e "s/MACOSX_DEPLOYMENT_TARGET = [0-9]*.[0-9]*;/MACOSX_DEPLOYMENT_TARGET = ${MIN_MACOS_VERSION};/" flutter/macos/Runner.xcodeproj/project.pbxproj

      - name: Build RustDesk
        shell: bash
        run: |
          ./build.py --flutter --hwcodec --unix-file-copy-paste

      - name: Create unsigned DMG
        shell: bash
        run: |
          CREATE_DMG="$(command -v create-dmg)"
          CREATE_DMG="$(readlink -f "$CREATE_DMG")"
          sed -i -e 's/MAXIMUM_UNMOUNTING_ATTEMPTS=3/MAXIMUM_UNMOUNTING_ATTEMPTS=7/' "$CREATE_DMG"
          create-dmg \
            --icon "RustDesk.app" 200 190 \
            --hide-extension "RustDesk.app" \
            --window-size 800 400 \
            --app-drop-link 600 185 \
            rustdesk-${{ env.VERSION }}-aarch64-custom.dmg \
            ./flutter/build/macos/Build/Products/Release/RustDesk.app

      - name: Upload unsigned macOS app
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-custom-macos-aarch64
          path: rustdesk-${{ env.VERSION }}-aarch64-custom.dmg
